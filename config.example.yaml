repo:
  path: ./content
  branch: main
  commit_author_name: Steelpage          # fallback when no user is signed in
  commit_author_email: steelpage@local   # fallback when no user is signed in
  auto_push: false                       # push to remote after each commit (best-effort, async)
  push_remote: origin

server:
  bind: 127.0.0.1:8080
  base_url: http://localhost:8080

db:
  path: ./steelpage.db

auth:
  mode: local
  allow_anonymous_read: true
  local_enabled: true
  session:
    secure: true    # set to false only for plain HTTP dev
  oidc:
    enabled: false
    label: "Authentik"
    issuer_url: "https://auth.example.com/application/o/steelpage/"
    client_id: ""
    client_secret: ""
    redirect_url: "https://docs.example.com/api/auth/oidc/callback"
    scopes: ["openid", "email", "profile"]

render:
  allow_raw_html: false
  mermaid: true
  code_highlighting: true
  sanitize_html: true

search:
  engine: sqlite_fts5

frontend:
  embedded_dist: ./frontend/dist

email:
  # SMTP transport. Leave host empty to disable outgoing mail entirely.
  host: ""                    # e.g. smtp.fastmail.com
  port: 0                     # 0 → defaults from encryption (starttls=587, tls=465, none=25)
  encryption: starttls        # none | starttls | tls
  username: ""                # set via env/secrets manager in production
  password: ""
  from_address: ""            # e.g. noreply@example.com
  from_name: "Steelpage"
  reply_to: ""                # optional
  insecure_skip_verify: false # dev only — accepts self-signed certs
